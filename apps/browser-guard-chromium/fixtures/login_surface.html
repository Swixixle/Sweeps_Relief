<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Login — Sweeps Account Access</title>
  </head>
  <body>
    <section>
      <h2>Member Login</h2>
      <p>
        Sign in to your sweeps account to redeem coins, access your wallet, and manage your bonus.
        Cashout available for verified accounts.
      </p>
      <form action="/api/account/login" method="post">
        <h3>Sign In</h3>
        <label for="login-email">Email Address</label>
        <input
          type="email"
          id="login-email"
          name="email"
          class="login-field email-input"
          placeholder="Enter your email address"
          autocomplete="email"
        />
        <label for="login-password">Password</label>
        <input
          type="password"
          id="login-password"
          name="password"
          class="login-field password-input"
          placeholder="Enter your password"
          autocomplete="current-password"
        />
        <button type="submit">Log In</button>
        <button type="button">Continue with Bonus</button>
      </form>
      <p>
        <a href="/forgot-password">Forgot your password?</a>
        <a href="/signup">Create new account</a>
      </p>
    </section>
  </body>
</html>
